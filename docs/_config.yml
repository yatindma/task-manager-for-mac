# GitHub Pages config for the /docs folder.
#
# There is no Jekyll theme here on purpose: index.html is a complete, self-contained
# static page with inlined CSS. Jekyll must not wrap it, and must not try to render
# README.md (the maintainer note) as a page.

theme: null
plugins: []

include:
  - robots.txt

exclude:
  - README.md
  - style.css.example
  # Jekyll converts any .md it sees into a .html of the same name — which silently
  # overwrote the hand-written limitations.html with an unstyled, title-less dump of
  # the markdown. The .md stays in the repo for GitHub (the README and CONTRIBUTING
  # link to it); the site serves the real page instead.
  - limitations.md
